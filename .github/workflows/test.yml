name : Test Automation
on : 
   push:
       branches: [main]
jobs:
    test-job:
            runs-on: ubuntu-latest
            defaults:
                run:
                    working-directory: backend
            steps:
                - name : checkout repo
                  uses : actions/checkout@v4
                - name : Setup Node
                  uses: actions/setup-node@v4
                - name: Install Dependency
                  run: npm install 
                - name : Run Test
                  run : npm test
                       

